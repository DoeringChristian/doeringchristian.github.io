[workspace]
authors = ["Christian Döring <christian.doering@tum.de>"]
channels = ["conda-forge"]
name = "profile-page"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
build = "python render.py"
format = "npm install prettier && npx prettier --write index.html styles/main.css"

[dependencies]
python = ">=3.9"
pyyaml = "*"
jinja2 = "*"
omegaconf = "*"
nodejs = "*"
pillow = "*"
